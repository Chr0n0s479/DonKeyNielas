<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-sm bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold text-center mb-6">
      DonKey Nielas
    </h1>

    <form 
    #loginForm="ngForm"
    (ngSubmit)="login()"
    class="space-y-4">

      <input
        type="email"
        placeholder="Correo"
        class="w-full border rounded-lg p-2"
        id="email"
        name="email"
        [(ngModel)]="email"
        required
        email
        minlength="5"
        maxlength="50"
        #emailRef="ngModel"
      />
      @if(emailRef.invalid && emailRef.touched){
        <p class="text-red-500 text-sm mt-1">
            Ingresa un correo valido
        </p>
      }


      <input
        type="password"
        placeholder="Contraseña"
        class="w-full border rounded-lg p-2"
        id="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="5"
        maxlength="25"
        #passwordRef="ngModel"
      />
      @if(passwordRef.invalid && passwordRef.touched){
        <p class="text-red-500 text-sm mt-1">
            Ingresa una contraseña valida
        </p>
      }

      <button
        class="w-full bg-green-600 text-white py-2 rounded-lg"
        [disabled]="loginForm.invalid"
        (onClick)="login()"
      >
        Iniciar sesión
      </button>

    </form>

    <p class="text-center mt-4 text-sm">
      ¿No tienes cuenta?

      <a
        routerLink="/register"
        class="text-blue-600 font-medium"
      >
        Crear cuenta
      </a>

    </p>

  </div>

</div>
